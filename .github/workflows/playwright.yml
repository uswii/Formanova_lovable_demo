name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_PIPELINE_API_URL: ${{ secrets.VITE_PIPELINE_API_URL }}
      VITE_PIPELINE_API_KEY: ${{ secrets.VITE_PIPELINE_API_KEY }}
      VITE_PIPELINE_ADMIN_SECRET: ${{ secrets.VITE_PIPELINE_ADMIN_SECRET }}
      VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Serve & run Playwright tests
        run: npx serve -s dist -l 8080 &
             sleep 2 &&
             npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
