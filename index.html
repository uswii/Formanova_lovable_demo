<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" id="favicon" type="image/png" href="/favicon-light.png" />
    <script>
      // Dynamic favicon for light/dark mode
      (function() {
        var fav = document.getElementById('favicon');
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function setFav(e) { fav.href = e.matches ? '/favicon-dark.png' : '/favicon-light.png'; }
        setFav(mq);
        mq.addEventListener('change', setFav);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormaNova | AI Jewelry Photoshoot Studio</title>
    <meta name="description" content="Transform your jewelry images into stunning professional photoshoots with trustworthy AI that preserves your product perfectly." />
    <meta name="author" content="FormaNova" />

    <!-- Open Graph -->
    <meta property="og:title" content="FormaNova | AI Jewelry Photoshoot Studio" />
    <meta property="og:description" content="Professional jewelry photoshoots in minutes. Pixel-perfect preservation guaranteed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://formanova.ai" />
    <meta property="og:image" content="https://formanova.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="640" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@FormaNova" />
    <meta name="twitter:title" content="FormaNova | AI Jewelry Photoshoot Studio" />
    <meta name="twitter:description" content="Professional jewelry photoshoots in minutes. Pixel-perfect preservation guaranteed." />
    <meta name="twitter:image" content="https://formanova.ai/og-image.png" />

    <!-- Marta Verba Typography - Bebas Neue + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- LCP hero image preloaded dynamically on landing page only (see Welcome.tsx) -->

    <!-- Critical fallback CSS: ensures readable layout if main CSS bundles fail to load -->
    <style id="critical-fallback-css">
      /* System font stack + basic resets */
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #111; background: #fff; }
      @media (prefers-color-scheme: dark) { body { color: #e5e5e5; background: #0a0a0a; } }
      /* Prevent overlap: ensure stacking context and flow */
      #root { display: flex; flex-direction: column; min-height: 100vh; }
      #root > * { width: 100%; box-sizing: border-box; }
      img, video { max-width: 100%; height: auto; }
      /* Usable buttons and inputs when CSS is missing */
      button, input, select, textarea { font: inherit; box-sizing: border-box; }
      button { cursor: pointer; padding: 0.5rem 1rem; }
      input, textarea, select { padding: 0.5rem; border: 1px solid #888; border-radius: 4px; background: inherit; color: inherit; }
      a { color: inherit; }
      /* Basic container spacing */
      main { padding: 1rem; flex: 1; }
      nav, header { padding: 0.75rem 1rem; }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Minimal loader: just dark background to prevent white flash while React mounts -->
      <div id="pre-react-loader" style="min-height:100vh;background:#0a0a0a;"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
